name: Update Visa Bulletin & News

# The Department of State publishes the next month's Visa Bulletin
# between the 9th and the 16th. We poll once a day in that window so we
# pick it up the morning it goes live, then stop until the next month.
# The news fetcher runs in the same job so headlines stay fresh.
#
# Required secrets: only the default GITHUB_TOKEN — no extra setup.
on:
  schedule:
    # 12:00 UTC = 08:00 ET — daily on days 9..16 of every month
    - cron: '0 12 9-16 * *'
  workflow_dispatch:
    inputs:
      month:
        description: 'Bulletin month (e.g. may). Leave blank to auto-detect latest.'
        required: false
      year:
        description: 'Bulletin year (e.g. 2026). Leave blank for current year.'
        required: false

permissions:
  contents: write

jobs:
  update:
    name: Fetch bulletin + news, commit to main
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch visa bulletin
        id: bulletin
        env:
          INPUT_MONTH: ${{ github.event.inputs.month }}
          INPUT_YEAR: ${{ github.event.inputs.year }}
        run: |
          ARGS=""
          if [ -n "$INPUT_MONTH" ]; then ARGS="$ARGS --month=$INPUT_MONTH"; fi
          if [ -n "$INPUT_YEAR"  ]; then ARGS="$ARGS --year=$INPUT_YEAR";  fi
          set +e
          node scripts/fetch-visa-bulletin.js $ARGS
          code=$?
          set -e
          if [ $code -eq 1 ]; then
            echo "::notice::Bulletin not yet published; will retry tomorrow."
            echo "ok=skipped" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ $code -ne 0 ]; then
            echo "::error::fetch-visa-bulletin.js failed with code $code"
            exit $code
          fi
          echo "ok=true" >> "$GITHUB_OUTPUT"

      - name: Fetch immigration news (best effort)
        continue-on-error: true
        run: node scripts/fetch-news.js

      - name: Detect changes
        id: diff
        run: |
          if git diff --quiet -- src/data/visaBulletin.js src/data/news.js; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true"  >> "$GITHUB_OUTPUT"
          fi

      - name: Verify build still passes
        if: steps.diff.outputs.changed == 'true'
        run: npm run build

      - name: Commit & push to main
        if: steps.diff.outputs.changed == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/visaBulletin.js src/data/news.js
          git commit -m "chore(data): auto-update visa bulletin & news ($(date -u +%Y-%m-%d))"
          git push origin HEAD:main

      - name: Skip — nothing to commit
        if: steps.diff.outputs.changed != 'true'
        run: echo "No new bulletin or news content — exiting cleanly."
